<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="VotaClaro — Tu voto, bien informado. Datos verificados del JNE, ONPE, Datum e Ipsos para las Elecciones Perú 2026.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VotaClaro">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VotaClaro — Elecciones Perú 2026</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* ── Splash overlay ──────────────────────────────────────────────────── */
    #vc-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.45s ease-out;
    }
    #vc-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #vc-splash video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- ── Video splash (plays before Flutter initialises) ──────────────── -->
  <div id="vc-splash">
    <video
      id="vc-splash-video"
      autoplay
      muted
      playsinline
      preload="auto"
      disablepictureinpicture
    >
      <source src="assets/splash.webm" type="video/webm">
      <source src="assets/splash.mp4"  type="video/mp4">
    </video>
  </div>

  <script>
    (function () {
      var splash  = document.getElementById('vc-splash');
      var video   = document.getElementById('vc-splash-video');
      var removed = false;

      function dismissSplash() {
        if (removed) return;
        removed = true;
        splash.classList.add('fade-out');
        setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 480);
      }

      // Dismiss when video ends naturally (≈ 2.5 s)
      video.addEventListener('ended', dismissSplash);

      // Safety: dismiss after 3.5 s even if video stalls / can't play
      setTimeout(dismissSplash, 3500);

      // On mobile, autoplay may be blocked; dismiss immediately in that case
      var playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(function () { dismissSplash(); });
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
