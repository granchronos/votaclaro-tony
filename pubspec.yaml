name: votaclaro
description: App electoral peruana — Elecciones Generales 2026. Información verificada, neutral y accesible para todos los ciudadanos.
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.3

  # Networking
  dio: ^5.4.3
  http: ^1.2.1

  # UI components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  expandable: ^5.0.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  flutter_dotenv: ^5.1.0
  logger: ^2.4.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Local storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0

  # XML / RSS parsing
  xml: ^6.5.0

  # Markdown / rich text
  flutter_markdown: ^0.7.3

  # PDF parsing
  syncfusion_flutter_pdf: ^27.1.58

  # Lottie animations
  lottie: ^3.1.2

  # Connectivity
  connectivity_plus: ^6.0.3

  # Backend / Supabase
  supabase_flutter: ^2.8.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/InterVariable.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
